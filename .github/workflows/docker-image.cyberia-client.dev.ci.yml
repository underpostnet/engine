name: CI | Docker Image cyberia-client (dev)

# Development variant of docker-image.cyberia-client.ci.yml. Publishes
# underpost/cyberia-client-dev (note the `-dev` suffix) from the dev Dockerfile
# (./Dockerfile.dev, synced into this repo from src/runtime/cyberia-client/
# Dockerfile.dev by `node bin run instance-build-manifest`). Used only by the
# development docker-compose stack.
#
# The dev Dockerfile builds the WASM bundle with BUILD_MODE=DEBUG (DWARF symbols,
# asserts, source maps) and serves it with CYBERIA_PORT=8082 by default; the
# compose stack overrides CYBERIA_PORT to keep the ecosystem on 8081.

on:
  workflow_dispatch:

# Single source of truth for the image version: the metadata tag (vX.Y.Z) and
# the baked underpost CLI (ARG UNDERPOST_VERSION) always move together.
env:
  UNDERPOST_VERSION: '3.2.30'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: underpost/cyberia-client-dev
          tags: |
            type=raw,value=v${{ env.UNDERPOST_VERSION }}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          # Build context is the cyberia-client repo root. Dockerfile.dev is the
          # project-root dev variant synced from src/runtime/cyberia-client/
          # Dockerfile.dev in the engine repo by `instance-build-manifest`.
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep the underpost CLI aligned with the image tag; build the WASM
          # bundle in DEBUG mode for the development image.
          build-args: |
            UNDERPOST_VERSION=${{ env.UNDERPOST_VERSION }}
            BUILD_MODE=DEBUG
