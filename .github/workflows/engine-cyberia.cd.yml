name: CD | Engine cyberia | remote ssh
on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (deploy, sync-and-deploy, init)'
        required: true
        type: choice
        options:
          - deploy
          - sync-and-deploy
          - init
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  deploy:
    if: github.event.inputs.job == 'deploy'
    name: Remote SSH deployment
    runs-on: ubuntu-latest
    steps:
      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          # Remote host (secret)
          host: ${{ secrets.SSH_HOST }}
          # Remote user (secret)
          username: ${{ secrets.SSH_USERNAME }}
          # Private key (secret) — the PEM contents (not a path)
          key: ${{ secrets.SSH_PRIV_KEY }}
          # Remote port (optional)
          port: ${{ secrets.SSH_PORT }}
          # Optional: increase timeout for long-running commands
          command_timeout: 60m
          # Optional: if your private key has a passphrase, add:
          # passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          # Commands to run on the remote VM
          script: |
            set -e
            set -o pipefail
            echo "Starting remote deploy"
            cd /home/dd/engine
            sudo -n -- /bin/bash -lc "node bin run pull"
            sudo -n -- /bin/bash -lc "npm install"
            sudo -n -- /bin/bash -lc "node bin run secret"
            sudo -n -- /bin/bash -lc "node bin run deploy dd-cyberia"
  sync-and-deploy:
    if: github.event.inputs.job == 'sync-and-deploy'
    name: Remote SSH sync and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          # Remote host (secret)
          host: ${{ secrets.SSH_HOST }}
          # Remote user (secret)
          username: ${{ secrets.SSH_USERNAME }}
          # Private key (secret) — the PEM contents (not a path)
          key: ${{ secrets.SSH_PRIV_KEY }}
          # Remote port (optional)
          port: ${{ secrets.SSH_PORT }}
          # Optional: increase timeout for long-running commands
          command_timeout: 60m
          # Optional: if your private key has a passphrase, add:
          # passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          # Commands to run on the remote VM
          script: |
            set -e
            set -o pipefail
            echo "Starting remote sync and deploy"
            TARGET_NODE=localhost.localdomain
            cd /home/dd/engine
            sudo -n -- /bin/bash -lc "node bin run pull"
            sudo -n -- /bin/bash -lc "npm install"
            sudo -n -- /bin/bash -lc "node bin run secret"
            sudo -n -- /bin/bash -lc "npm run test"
            sudo -n -- /bin/bash -lc "node bin run clean src/client/public/cyberia"
            sudo -n -- /bin/bash -lc "node bin run clean src/client/public/underpost"
            sudo -n -- /bin/bash -lc "node bin cmt src/client/public/cyberia --init-repo"
            sudo -n -- /bin/bash -lc "node bin cmt src/client/public/underpost --init-repo"
            sudo -n -- /bin/bash -lc "node bin fs src/client/public/cyberia --pull --recursive --deploy-id dd-cyberia"
            sudo -n -- /bin/bash -lc "node bin fs src/client/public/underpost --pull --recursive --deploy-id dd-cyberia --storage-file-path './engine-private/conf/dd-cyberia/storage.underpost.json'"
            CHANGES_CYBERIA=$(sudo -n -- /bin/bash -lc "node bin cmt src/client/public/cyberia --has-changes" | tr -d '\n')
            if [ "$CHANGES_CYBERIA" = "1" ]; then
              sudo -n -- /bin/bash -lc "node bin cmt src/client/public/cyberia feat 'Update cyberia public assets'"
            fi
            CHANGES_UNDERPOST=$(sudo -n -- /bin/bash -lc "node bin cmt src/client/public/underpost --has-changes" | tr -d '\n')
            if [ "$CHANGES_UNDERPOST" = "1" ]; then
              sudo -n -- /bin/bash -lc "node bin cmt src/client/public/underpost feat 'Update underpost public assets'"
            fi
            sudo -n -- /bin/bash -lc "node bin run sync 'dd-cyberia,1,,underpost/engine-cyberia:latest' \
              --kubeadm \
              --deploy-id-cron-jobs none \
              --timeout-response 300000ms \
              --node-name ${TARGET_NODE} \
              --ssh-key-path /home/dd/tmp/897as9dxhaskd9 \
              --image-pull-policy Always \
              --cmd 'cd /home/dd/engine, \
                underpost clone underpostnet/engine-cyberia, \
                mkdir -p /home/dd/engine/src/client/public/itemledger \
                  /home/dd/engine/src/client/public/cryptokoyn \
                  /home/dd/engine/src/client/components/cryptokoyn \
                  /home/dd/engine/src/client/components/itemledger \
                  /home/dd/engine/hardhat, \
                cp -a ./engine-cyberia/src/client/public/itemledger/. /home/dd/engine/src/client/public/itemledger/, \
                cp -a ./engine-cyberia/src/client/public/cryptokoyn/. /home/dd/engine/src/client/public/cryptokoyn/, \
                cp -a ./engine-cyberia/src/client/components/cryptokoyn/. /home/dd/engine/src/client/components/cryptokoyn/, \
                cp -a ./engine-cyberia/src/client/components/itemledger/. /home/dd/engine/src/client/components/itemledger/, \
                cp -a ./engine-cyberia/src/client/Itemledger.index.js /home/dd/engine/src/client/Itemledger.index.js, \
                cp -a ./engine-cyberia/src/client/Cryptokoyn.index.js /home/dd/engine/src/client/Cryptokoyn.index.js, \
                rm -rf ./engine-cyberia, \
                sudo rm -rf ./engine-private/, \
                node bin clone underpostnet/engine-cyberia-private, \
                sudo mv ./engine-cyberia-private ./engine-private, \
                node bin env dd-cyberia production, \
                node ./engine-private/itc-scripts/dd-cyberia-0.js, \
                sudo chown -R dd:dd /home/dd/engine/src/client/public/cyberia, \
                node bin/cyberia run-workflow import-default-items, \
                node bin env dd-cyberia production, \
                node bin client dd-cyberia, \
                node bin start dd-cyberia production --run'"
  init:
    if: github.event.inputs.job == 'init'
    name: Remote SSH init deployment
    runs-on: ubuntu-latest
    steps:
      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          # Remote host (secret)
          host: ${{ secrets.SSH_HOST }}
          # Remote user (secret)
          username: ${{ secrets.SSH_USERNAME }}
          # Private key (secret) — the PEM contents (not a path)
          key: ${{ secrets.SSH_PRIV_KEY }}
          # Remote port (optional)
          port: ${{ secrets.SSH_PORT }}
          # Optional: increase timeout for long-running commands
          command_timeout: 60m
          # Optional: if your private key has a passphrase, add:
          # passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          # Commands to run on the remote VM
          script: |
            set -e
            set -o pipefail
            echo "Starting init deploy"
            cd /home/dd/engine
            sudo -n -- /bin/bash -lc "node bin run pull"
            sudo -n -- /bin/bash -lc "npm install"
            sudo -n -- /bin/bash -lc "node bin run secret"
            sudo -n -- /bin/bash -lc "node bin/build dd-cyberia --conf"
            sudo -n -- /bin/bash -lc "node bin deploy dd-cyberia production --kubeadm --sync --build-manifest --timeout-response 300000ms --versions green --replicas 1"
            sudo -n -- /bin/bash -lc "node bin deploy dd-cyberia production --kubeadm --disable-update-proxy --git-clean"
            sudo -n -- /bin/bash -lc "node bin monitor dd-cyberia production --ready-deployment --promote --timeout-response 300000ms --versions green --replicas 1"
