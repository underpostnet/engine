name: CI | Docker Image cyberia-server

on:
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # Pull the cyberia-server runtime sources into ./cyberia-server.
      # The image is then built from the engine repo as the docker context,
      # so the Dockerfile can reach into both engine/src/runtime/cyberia-server
      # and cyberia-server/* in a single COPY surface.
      - name: Checkout cyberia-server
        uses: actions/checkout@v6
        with:
          repository: underpostnet/cyberia-server
          path: cyberia-server

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      # The SSR dashboard for /metrics and operator status lives in
      # src/client/ssr/views/CyberiaServerMetrics.js inside the engine repo
      # and is rendered by the engine-cyberia CLI (`node bin/cyberia
      # run-workflow build-server-dashboard`). The Go server hard-requires
      # ./public/index.html on boot (cmd/cyberia-server/main.go calls
      # log.Fatalf when findPublicDir returns empty), so we must run this
      # step before the docker build picks up cyberia-server/public/.
      - name: Install engine dependencies
        run: npm ci --ignore-scripts

      - name: Build cyberia-server SSR dashboard
        run: |
          node bin/deploy cyberia
          node bin/cyberia run-workflow build-server-dashboard

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: underpost/cyberia-server
          tags: |
            type=raw,value=v3.2.9
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/runtime/cyberia-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep the underpost CLI installed in the image aligned with the
          # image tag. The Dockerfile accepts ARG UNDERPOST_VERSION.
          build-args: |
            UNDERPOST_VERSION=3.2.9
