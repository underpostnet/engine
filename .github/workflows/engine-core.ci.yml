name: CI | Engine core | github repository
on:
  workflow_run:
    workflows: ['CI | Publish npm repository package']
    types:
      - completed
  workflow_dispatch:
    inputs:
      sync:
        description: 'Trigger sync-and-deploy CD after build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      message:
        description: 'Commit message for the build'
        required: false
        default: ''
      deploy_type:
        description: 'CD job type to dispatch (sync-and-deploy or init)'
        required: false
        default: 'sync-and-deploy'
        type: choice
        options:
          - sync-and-deploy
          - init
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  pwa-microservices-template:
    name: Update github repo package Jobs
    env:
      SYNC: ${{ startsWith(github.event.workflow_run.head_commit.message, 'ci(package-pwa-microservices-template-sync-engine-core)') || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync == 'true') }}
    runs-on: ubuntu-latest
    container:
      image: quay.io/rockylinux/rockylinux:9
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install required packages
        run: |
          dnf install -y sudo tar gzip bzip2 git
          dnf install -y curl --allowerasing

      - name: Install Node.js
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_24.x | bash -
          dnf install nodejs -y

      - name: Install dependencies
        run: |
          npm install -g underpost
          npm install
          underpost config set GITHUB_TOKEN ${{ secrets.GIT_AUTH_TOKEN }}

      - name: Set git global credentials
        run: |
          git config --global --add safe.directory '*'
          git config --global user.name 'underpostnet'
          git config --global user.email 'development@underpost.net'

      - name: Build repository
        run: |
          cd .. && underpost clone underpostnet/pwa-microservices-template
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.message }}" ]; then
            LAST_COMMIT_MESSAGE="${{ github.event.inputs.message }}"
          else
            FULL_MSG=$(cd pwa-microservices-template && git log -1 --pretty=%B 2>/dev/null || echo "")
            LAST_COMMIT_MESSAGE=$(echo "$FULL_MSG" | sed '1s/^[^:]*: [^ ]* //')
          fi
          if [ -z "$LAST_COMMIT_MESSAGE" ]; then
            LAST_COMMIT_MESSAGE="Update engine core repository"
          fi
          echo "[INFO] Captured commit message: $LAST_COMMIT_MESSAGE"
          underpost clone --bare underpostnet/engine-core
          cd engine
          node bin/build dd-core development
          cd ../pwa-microservices-template
          rm -rf ./.git
          mv ../engine-core.git ./.git
          git init
          git config user.name 'underpostnet'
          git config user.email 'development@underpost.net'
          git add .
          git commit -m "$LAST_COMMIT_MESSAGE"
          underpost push . underpostnet/engine-core
          if [ "${SYNC}" = "true" ]; then
            DEPLOY_TYPE="${{ github.event.inputs.deploy_type }}"
            if [ -z "$DEPLOY_TYPE" ]; then
              DEPLOY_TYPE="sync-and-deploy"
            fi
            echo "[INFO] Dispatching engine-core CD ${DEPLOY_TYPE}"
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GIT_AUTH_TOKEN }}" \
              "https://api.github.com/repos/underpostnet/engine/actions/workflows/engine-core.cd.yml/dispatches" \
              -d "{\"ref\":\"master\",\"inputs\":{\"job\":\"${DEPLOY_TYPE}\"}}"
          else
            echo "[INFO] Deployment skipped"
          fi
