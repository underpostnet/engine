# ─────────────────────────────────────────────────────────────────────────────
# Dependabot – Automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# ─────────────────────────────────────────────────────────────────────────────
version: 2

updates:
  # ── Root project (npm) ──────────────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    reviewers:
      - 'underpostnet'
    labels:
      - 'dependencies'
      - 'engine'
    # Group minor/patch updates into a single PR to reduce noise
    groups:
      express-stack:
        patterns:
          - 'express'
          - 'express-*'
          - 'cors'
          - 'compression'
          - 'cookie-parser'
          - 'helmet'
          - 'morgan'
          - 'http-proxy-middleware'
      database-clients:
        patterns:
          - 'mongoose'
          - 'mariadb'
          - 'iovalkey'
      grpc:
        patterns:
          - '@grpc/*'
      frontend-libs:
        patterns:
          - '@fortawesome/*'
          - '@fullcalendar/*'
          - '@neodrag/*'
          - 'ag-grid-community'
          - 'd3'
          - 'dexie'
          - 'easymde'
          - 'fullcalendar'
          - 'sortablejs'
          - 'vanilla-jsoneditor'
          - 'peerjs'
          - 'peer'
      workbox:
        patterns:
          - 'workbox-*'
      tooling:
        patterns:
          - 'nodemon'
          - 'esbuild'
          - 'html-minifier-terser'
          - 'prettier'
          - 'jsdoc'
          - 'clean-jsdoc-theme'
          - 'swagger-autogen'
          - 'swagger-ui-express'
          - 'typedoc'
          - 'typescript'
          - 'bumpp'
      testing:
        patterns:
          - 'mocha'
          - 'chai'
          - 'c8'
      utilities:
        patterns:
          - 'axios'
          - 'dotenv'
          - 'commander'
          - 'fs-extra'
          - 'adm-zip'
          - 'shelljs'
          - 'colors'
          - 'winston'
          - 'nodemailer'
          - 'cloudinary'
          - 'favicons'
          - 'marked'
          - 'validator'
          - 'jsonwebtoken'
          - 'sitemap'
          - 'socket.io'
          - 'prom-client'
          - 'escape-string-regexp'
          - 'fast-json-stable-stringify'
          - 'ignore-walk'
          - 'read'
          - 'split-file'
          - 'clipboardy'
    commit-message:
      prefix: 'deps(engine)'

  # ── Hardhat (npm) ────────────────────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/hardhat'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    reviewers:
      - 'underpostnet'
    labels:
      - 'dependencies'
      - 'hardhat'
    # Group minor/patch updates into a single PR to reduce noise
    groups:
      hardhat-toolchain:
        patterns:
          - 'hardhat'
          - '@nomicfoundation/*'
      openzeppelin:
        patterns:
          - '@openzeppelin/*'
      hardhat-utilities:
        patterns:
          - 'dotenv'
          - 'fs-extra'
    # hardhat/package.json already uses Hardhat 3 — no ignore blocks needed
    commit-message:
      prefix: 'deps(hardhat)'

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'ci(actions)'
