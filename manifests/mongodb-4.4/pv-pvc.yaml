apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv-0
  labels:
    app: mongodb
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: mongodb-storage-class
  claimRef:
    namespace: default
    name: mongodb-storage-mongodb-0
  hostPath:
    path: /data/mongodb/v0
    type: DirectoryOrCreate
