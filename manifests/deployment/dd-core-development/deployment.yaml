---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-core-development-blue
  namespace: default
  labels:
    app: dd-core-development-blue
    deploy-id: dd-core-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-core-development-blue
  template:
    metadata:
      labels:
        app: dd-core-development-blue
        deploy-id: dd-core-development
    spec:
      containers:
        - name: dd-core-development-blue
          image: localhost/rockylinux9-underpost:v3.2.0

          command:
            - /bin/sh
            - -c
            - >
              npm install -g npm@11.2.0 && npm install -g underpost && underpost secret underpost --create-from-file /etc/config/.env.development && underpost start --build --run dd-core development

    
          volumeMounts:
            - name: config-volume-dd-core-development-blue
              mountPath: /etc/config
    
      volumes:
        - name: config-volume-dd-core-development-blue
          configMap:
            name: underpost-config
    
      
