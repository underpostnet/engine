
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: dogmadual.com
  namespace: default
spec:
  virtualhost:
    fqdn: dogmadual.com
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-core-development-blue-service
          port: 4017
          weight: 100
    
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: www.dogmadual.com
  namespace: default
spec:
  virtualhost:
    fqdn: www.dogmadual.com
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-core-development-blue-service
          port: 4018
          weight: 100
    
    - conditions:
        - prefix: /peer
      
      enableWebsockets: true
      services:
        - name: dd-core-development-blue-service
          port: 4019
          weight: 100
    
