---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-prototype-development-blue
  namespace: default
  labels:
    app: dd-prototype-development-blue
    deploy-id: dd-prototype-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-prototype-development-blue
  template:
    metadata:
      labels:
        app: dd-prototype-development-blue
        deploy-id: dd-prototype-development
    spec:
      containers:
        - name: dd-prototype-development-blue
          image: underpost/underpost-engine:v3.2.12
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: underpost-config

          command:
            - /bin/sh
            - -c
            - >
              underpost secret underpost --create-from-env &&
              underpost start --build --run dd-prototype development



---
apiVersion: v1
kind: Service
metadata:
  name: dd-prototype-development-blue-service
  namespace: default
spec:
  selector:
    app: dd-prototype-development-blue
  ports:
    - name: 'tcp-4023'
      protocol: TCP
      port: 4023
      targetPort: 4023
    - name: 'udp-4023'
      protocol: UDP
      port: 4023
      targetPort: 4023

    - name: 'tcp-4024'
      protocol: TCP
      port: 4024
      targetPort: 4024
    - name: 'udp-4024'
      protocol: UDP
      port: 4024
      targetPort: 4024

    - name: 'tcp-4025'
