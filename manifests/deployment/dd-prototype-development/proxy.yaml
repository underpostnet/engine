
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: healthcare.nexodev.org
  namespace: default
spec:
  virtualhost:
    fqdn: healthcare.nexodev.org
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-prototype-development-blue-service
          port: 4023
          weight: 100
    
    - conditions:
        - prefix: /peer
      
      enableWebsockets: true
      services:
        - name: dd-prototype-development-blue-service
          port: 4024
          weight: 100
    
