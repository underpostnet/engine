---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-test-development-blue
  namespace: default
  labels:
    app: dd-test-development-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-test-development-blue
  template:
    metadata:
      labels:
        app: dd-test-development-blue
    spec:
      containers:
        - name: dd-test-development-blue
          image: localhost/rockylinux9-underpost:v3.0.3

          command:
            - /bin/sh
            - -c
            - >
              npm install -g npm@11.2.0 && npm install -g underpost && underpost secret underpost --create-from-file /etc/config/.env.development && underpost start --build --run dd-test development

    
          volumeMounts:
            - name: config-volume-dd-test-development-blue
              mountPath: /etc/config
    
      volumes:
        - name: config-volume-dd-test-development-blue
          configMap:
            name: underpost-config
    
      
---
apiVersion: v1
kind: Service
metadata:
  name: dd-test-development-blue-service
  namespace: default
spec:
  selector:
    app: dd-test-development-blue
  ports:
    - name: 'tcp-4038'
      protocol: TCP
      port: 4038
      targetPort: 4038
    - name: 'udp-4038'
      protocol: UDP
      port: 4038
      targetPort: 4038

    - name: 'tcp-4039'
      protocol: TCP
      port: 4039
      targetPort: 4039
    - name: 'udp-4039'
      protocol: UDP
      port: 4039
      targetPort: 4039

    - name: 'tcp-4040'
      protocol: TCP
      port: 4040
      targetPort: 4040
    - name: 'udp-4040'
      protocol: UDP
      port: 4040
      targetPort: 4040

    - name: 'tcp-4041'
      protocol: TCP
      port: 4041
      targetPort: 4041
    - name: 'udp-4041'
      protocol: UDP
      port: 4041
      targetPort: 4041
  type: LoadBalancer
