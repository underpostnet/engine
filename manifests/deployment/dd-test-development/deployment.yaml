---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-test-development-blue
  namespace: default
  labels:
    app: dd-test-development-blue
    deploy-id: dd-test-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-test-development-blue
  template:
    metadata:
      labels:
        app: dd-test-development-blue
        deploy-id: dd-test-development
    spec:
      containers:
        - name: dd-test-development-blue
          image: underpost/underpost-engine:v3.2.5
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: underpost-config

          command:
            - /bin/sh
            - -c
            - >
              underpost secret underpost --create-from-env &&
              underpost start --build --run dd-test development


---
apiVersion: v1
kind: Service
metadata:
  name: dd-test-development-blue-service
  namespace: default
spec:
  selector:
    app: dd-test-development-blue
  ports:
    - name: 'tcp-4033'
      protocol: TCP
      port: 4033
      targetPort: 4033
    - name: 'udp-4033'
      protocol: UDP
      port: 4033
      targetPort: 4033

    - name: 'tcp-4034'
      protocol: TCP
      port: 4034
      targetPort: 4034
    - name: 'udp-4034'
      protocol: UDP
      port: 4034
      targetPort: 4034

    - name: 'tcp-4035'
      protocol: TCP
      port: 4035
      targetPort: 4035
    - name: 'udp-4035'
      protocol: UDP
      port: 4035
      targetPort: 4035

    - name: 'tcp-4036'
      protocol: TCP
      port: 4036
      targetPort: 4036
    - name: 'udp-4036'
      protocol: UDP
      port: 4036
      targetPort: 4036

    - name: 'tcp-4037'
      protocol: TCP
      port: 4037
      targetPort: 4037
    - name: 'udp-4037'
      protocol: UDP
      port: 4037
      targetPort: 4037
  type: LoadBalancer
