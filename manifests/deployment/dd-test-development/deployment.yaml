---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-test-development-blue
  namespace: default
  labels:
    app: dd-test-development-blue
    deploy-id: dd-test-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dd-test-development-blue
  template:
    metadata:
      labels:
        app: dd-test-development-blue
        deploy-id: dd-test-development
    spec:
      containers:
        - name: dd-test-development-blue
          image: localhost/rockylinux9-underpost:v3.2.3
          envFrom:
            - secretRef:
                name: underpost-config

          command:
            - /bin/sh
            - -c
            - >
              npm install -g npm@11.2.0 &&
              npm install -g underpost &&
              underpost secret underpost --create-from-env &&
              underpost start --build --run dd-test development


---
apiVersion: v1
kind: Service
metadata:
  name: dd-test-development-blue-service
  namespace: default
spec:
  selector:
    app: dd-test-development-blue
  ports:
    - name: 'tcp-4046'
      protocol: TCP
      port: 4046
      targetPort: 4046
    - name: 'udp-4046'
      protocol: UDP
      port: 4046
      targetPort: 4046

    - name: 'tcp-4047'
      protocol: TCP
      port: 4047
      targetPort: 4047
    - name: 'udp-4047'
      protocol: UDP
      port: 4047
      targetPort: 4047

    - name: 'tcp-4048'
      protocol: TCP
      port: 4048
      targetPort: 4048
    - name: 'udp-4048'
      protocol: UDP
      port: 4048
      targetPort: 4048

    - name: 'tcp-4049'
      protocol: TCP
      port: 4049
      targetPort: 4049
    - name: 'udp-4049'
      protocol: UDP
      port: 4049
      targetPort: 4049

    - name: 'tcp-4050'
      protocol: TCP
      port: 4050
      targetPort: 4050
    - name: 'udp-4050'
      protocol: UDP
      port: 4050
      targetPort: 4050
  type: LoadBalancer
