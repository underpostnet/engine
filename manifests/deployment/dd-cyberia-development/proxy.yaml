
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: underpost.net
  namespace: default
spec:
  virtualhost:
    fqdn: underpost.net
  routes:
    - conditions:
        - prefix: /
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4005
          weight: 100
    
    - conditions:
        - prefix: /peer
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4006
          weight: 100
    
    - conditions:
        - prefix: /r1
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4007
          weight: 100
    
    - conditions:
        - prefix: /r1/peer
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4008
          weight: 100
    
    - conditions:
        - prefix: /r5
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4009
          weight: 100
    
    - conditions:
        - prefix: /r5/peer
      
      enableWebsockets: true
      services:
        - name: dd-cyberia-development-blue-service
          port: 4010
          weight: 100
    
