apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb # Specifies the name of the statefulset
spec:
  serviceName: 'mongodb-service' # Specifies the service to use
  podManagementPolicy: Parallel # or OrderedReady
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: docker.io/library/mongo:latest
          command:
            - mongod
            - '--replSet'
            - 'rs0'
            - '--auth'
            - '--clusterAuthMode'
            - 'keyFile'
            - '--keyFile'
            - '/etc/mongodb-keyfile/mongodb-keyfile'
            - '--logpath'
            - '/var/log/mongodb/mongod.log'
            - '--bind_ip_all'
          # command: ['sh', '-c']
          # args:
          #   - |
          #     mongod --replSet rs0 --bind_ip_all &
          #     sleep 1000
          #     if mongosh --host mongodb-0.mongodb-service:27017 --eval "rs.status()" | grep -q "not yet initialized"; then
          #       mongosh --host mongodb-0.mongodb-service:27017 <<EOF
          #       use admin;
          #       rs.initiate({
          #         _id: "rs0",
          #         members: [
          #           { _id: 0, host: "mongodb-0.mongodb-service:27017", priority: 1 },
          #           { _id: 1, host: "mongodb-1.mongodb-service:27017", priority: 1 }
          #         ]
          #       });
          #       db.getSiblingDB("admin").createUser({
          #         user: process.env.MONGO_INITDB_ROOT_USERNAME,
          #         pwd: process.env.MONGO_INITDB_ROOT_PASSWORD,
          #         roles: [{ role: "userAdminAnyDatabase", db: "admin" }]
          #       });
          #       use default;
          #       db.createUser(
          #         {
          #           user: process.env.MONGO_INITDB_ROOT_USERNAME,
          #           pwd: process.env.MONGO_INITDB_ROOT_PASSWORD,
          #           roles: [
          #             { role: "read", db: "test" },
          #             { role: "readWrite", db: "default" }
          #           ]
          #         }
          #       );
          #       EOF
          #     fi
          #     wait
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongodb-keyfile
              readOnly: true
            # - name: mongodb-configuration-file
            #   mountPath: /etc/mongod.conf
            #   subPath: mongod.conf
            #   readOnly: true
            # - name: mongodb-config
            #   mountPath: /config
          env:
            - name: MONGO_REPLICA_SET_NAME
              value: rs0
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - mongosh --quiet --host localhost --authenticationDatabase admin -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --eval 'db.adminCommand({ ping: 1 })'
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -lc
                - mongosh --quiet --host localhost --authenticationDatabase admin -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" --eval 'db.adminCommand({ ping: 1 })'
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
      volumes:
        - name: keyfile
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
        # - name: mongodb-configuration-file
        #   configMap:
        #     name: mongodb-config-file
        # - name: mongodb-config
        #   configMap:
        #     name: mongodb-config
  volumeClaimTemplates:
    - metadata:
        name: mongodb-storage
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: mongodb-storage-class
        resources:
          requests:
            storage: 5Gi
