# Reverse proxy for the Cyberia ecosystem compose stack (custom workflow:
# --deploy-id dd-cyberia --docker-compose-id cyberia). Hand-authored source of
# truth for this stack — used as-is (not generated). Mirrors the render format
# of src/runtime/nginx/Nginx.js (websocket upgrade map, named upstreams,
# proxy_http_version 1.1, per-host servers).
#
# Host -> upstream mapping (matches engine-private/conf/dd-cyberia hosts):
#   www.cyberiaonline.com    -> engine-cyberia:4005  (portal + REST + WS authority)
#   server.cyberiaonline.com -> cyberia-server:8081  (Go MMO simulation / websocket)
#   client.cyberiaonline.com -> cyberia-client:8081  (WASM presentation bundle)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream up_engine_cyberia { server engine-cyberia:4005; }
upstream up_cyberia_server { server cyberia-server:8081; }
upstream up_cyberia_client { server cyberia-client:8081; }

proxy_http_version 1.1;

server {
    listen 80 default_server;
    server_name _ cyberiaonline.com www.cyberiaonline.com;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://up_engine_cyberia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80;
    server_name server.cyberiaonline.com;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://up_cyberia_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80;
    server_name client.cyberiaonline.com;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://up_cyberia_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
